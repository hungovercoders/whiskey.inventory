name: Trigger auto deployment for dev-whiskey-ca-eun-hngc

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - 'WhiskeyAPI/**'
    - '.github/workflows/dev-whiskey-ca-eun-hngc-AutoDeployTrigger-462b2322-ccdc-4059-8d03-9231a9f493ef.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.DEVWHISKEYCAEUNHNGC_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.DEVWHISKEYCAEUNHNGC_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.DEVWHISKEYCAEUNHNGC_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}WhiskeyAPI 
          registryUrl: docker.io
          registryUsername: ${{ secrets.DEVWHISKEYCAEUNHNGC_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.DEVWHISKEYCAEUNHNGC_REGISTRY_PASSWORD }}
          containerAppName: dev-whiskey-ca-eun-hngc
          resourceGroup: dev-whiskey-rg-hngc
          imageToBuild: griff182uk/dev-whiskey-ca-eun-hngc:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


