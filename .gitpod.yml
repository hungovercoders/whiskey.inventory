image:
  file: .cde.Dockerfile

tasks:
  - name: Versions
    command: |
      sh ./cde/versions.sh
  - name: Azure CLI
    command: |
      sh ./cde/azure_sp.sh
      gp sync-done waitonazurecli
  - name: Azure Storage
    command: |
      gp sync-await waitonazurecli
      sh ./cde/storage.sh
      gp sync-done waitonnstate
  - name: Terraform
    command: |
      gp sync-await waitonnstate
      sh ./cde/terraform.sh

vscode:
  extensions:
    - hashicorp.terraform
    - ms-azuretools.vscode-docker
    - ms-dotnettools.csharp